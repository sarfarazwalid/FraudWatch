[tool.black]
line-length = 88
target-version = ['py312']

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "E501", "W503"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

# Known library stub issues - these are common false positives
[[tool.mypy.overrides]]
module = [
    "celery.*",
    "jose.*",
    "passlib.*",
    "kombu.*",
    "ml.*",
    "app.models.*",
]
ignore_missing_imports = true

# Library stubs that return Any
[[tool.mypy.overrides]]
module = [
    "passlib.*",
    "jose.*",
    "app.security.*",
    "app.services.password",
    "app.services.jwt",
]
disable_error_code = ["no-any-return"]

# SQLAlchemy __table_args__ is tuple but Base types it as dict - known limitation
[[tool.mypy.overrides]]
module = "app.models.*"
disable_error_code = ["assignment", "type-arg"]

# Celery task decorators are untyped - known limitation
[[tool.mypy.overrides]]
module = "app.workers.*"
disable_error_code = ["misc", "no-untyped-def", "call-overload", "no-any-return"]

# FastAPI route handlers - common pattern to omit return types
[[tool.mypy.overrides]]
module = "app.api.*"
disable_error_code = ["no-untyped-def", "attr-defined", "call-arg", "assignment", "arg-type", "valid-type"]

# Services with SQLAlchemy dynamic attributes
[[tool.mypy.overrides]]
module = "app.services.*"
disable_error_code = ["attr-defined", "valid-type", "no-any-return", "assignment", "call-arg", "arg-type"]

# Repositories with SQLAlchemy dynamic attributes
[[tool.mypy.overrides]]
module = "app.repositories.*"
disable_error_code = ["attr-defined", "assignment", "call-arg", "arg-type"]
