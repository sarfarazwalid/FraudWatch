name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20.x"
  PYTHON_VERSION: "3.12"

jobs:
  # Lint and format check
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      
      - name: Check formatting (backend)
        working-directory: backend
        run: |
          python -m pip install black isort flake8 --quiet
          black --check app/ tests/
          isort --check-only app/ tests/
          flake8 app/ tests/
      
      - name: Type check (backend)
        working-directory: backend
        run: |
          python -m pip install mypy --quiet
          mypy app/

  # Backend tests
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fraudwatch
          POSTGRES_PASSWORD: fraudwatch_test
          POSTGRES_DB: fraudwatch_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --quiet
          pip install pytest pytest-asyncio pytest-cov --quiet
      
      - name: Run migrations
        working-directory: backend
        run: |
          python -m pip install alembic --quiet
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://fraudwatch:fraudwatch_test@localhost:5432/fraudwatch_test_db
          DATABASE_SYNC_URL: postgresql://fraudwatch:fraudwatch_test@localhost:5432/fraudwatch_test_db
      
      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://fraudwatch:fraudwatch_test@localhost:5432/fraudwatch_test_db
          DATABASE_SYNC_URL: postgresql://fraudwatch:fraudwatch_test@localhost:5432/fraudwatch_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  # Frontend tests
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # Build and test Docker images
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          target: production
          push: false
          tags: fraudwatch-backend:${{ github.sha }}
      
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          target: production
          push: false
          tags: fraudwatch-frontend:${{ github.sha }}
      
      - name: Test Docker Compose
        run: docker-compose -f docker/docker-compose.yml config
</parameter>
